; =====================================
; Configuration file for StarUI Outpost
; =====================================
; 
; Allows you to configure many different settings for StarUI Outpost. 
;
; Some general notes and tips: 
; 
; Position
; --------
; The position is specified based on a 1920x1080 layer. If you have another resolution, it will 
; automatically transformed into the position on your monitor.
; 
; Color
; -----
; The sColors values are color modifiers, so if apply a red color to a green element it will 
; become orange!
; For most widgets you have the option bForceColor, which will force the color. But be careful,
; this setting will remove ALL color information as well as any brightness levels from the widget.
; The colors are specified as "red, green, blue(, alpha)" where alpha is optional. 
; RGB values are from 0 to 255. Alpha is from 0 to 100 (percent).
; Most colors are optional overrides. So if you don't specify a value for the widget, it will 
; use the current modes default color (sDefaultColorBuild and sDefaultColorInspect).
; 
; Examples: 
;   black is "0, 0, 0"
;   white is "255, 255, 255"
;   red is "255, 0, 0"
;   blue is "0, 0, 255"
;   half-transparent without color is "255, 255, 255, 50"
; Color tip: Use any of the common RGB color picker on the net to find your values!
;
; Anchors
; -------
; Define a point on an element for various features (like as alignment for the item card, so in 
; which direction an item card should be drawn or at which point the leading line attaches to)
;
; Valid values: TopLeft, TopRight, BottomLeft, BottomRight, {HorizontalOffset}% {VerticalOffset}%
;
; Examples for free percent values:
;   0% 0%     - Equals TopLeft
;   100% 0%   - Equals TopRight
;   100% 100% - Equals BottomRight
;   50% 50%   - The center of the shape
;   0% 25%    - This will position the anchor on the left side on 1/4 height.
;
; Tips
; ------------
; * You can edit this file while the game is running. A simple close/re-open the outpost interface 
;   load the new configuration! 
; * Copy this file and rename the copy to "StarUI Outpost.ini". Then change your settings in the 
;   new file. The new file won't be overwritten by mod updates!
; * Use StarUI Configurator to edit all settings in an easy-to-use graphical interface.

[StarUI Outpost]

; Colors (default vanilla outpost color: 201, 181, 97)
; Default interface color in build mode
sDefaultColorBuild = 122, 192, 244
; Default interface color in inspect mode
sDefaultColorInspect = 90, 180, 100

; Skip the open and close animation of the interface
bInstantOpenClose = 0

; (Keyboard/Mouse) Use TAB to change build/inspect mode
bTabIsChangeMode = 0

; The default screen padding (space from the border). Will be used as element's fScreenPadding if no other value is set there.
fDefaultScreenPadding = 50

[BuildMenu]
; The new Build Menu with folded lists added by StarUI 

; Add a shadow to the background while you are in the build menu 
iMenuBackgroundShadow = 50

; ---- Categories ----
bCategoriesShowIcon = 1

; ---- Buildings ----
; Show an icon for the building
bBuildingsShowIcon = 1
; Add the number of sub-variants to the buildings list
bBuildingsShowVariantsCount = 1

; ---- Variants ----

; Show an icon for the variant
bVariantsShowIcon = 1
; Add Numbers, e.g. Poster 1, Poster 2
bVariantsAddNumberToEqualNamed = 1
; Remove common prefixes in the submenu. e.g. "Extractor - Iron" and "Extractor - Water" will be displayed as "Iron" and "Water"
bVariantsRemoveCommonPrefixes = 1
; Replaces the first variant in a series with "Default". e.g "Extractor - Water" and "Extractor - Water - Commercial" will be displayed as "Default" and "Commercial" 
bVariantsReplaceCommonPrefixWithDefault = 1
; Adds the produced item to the variants as subtitle (e.g. for Builders>Fabricator)
bVariantsAddProducedItem = 1
; Will skip the variants list if only one variant is available
bVariantsSkipListForSingle = 1

; ---- Position ----
fPositionX = 0
fPositionY = -113
sScreenAnchor = BottomLeft
; Define in which direction the list should expand. Values: TopLeft, TopRight, BottomLeft, BottomRight
sDirection = TopRight


[Frame]
; The outer Frame around the screen
; Enables or disable the element
bEnabled = 1
; Set a new color modified
sColor = 
; Force the color (removes any color tones or brightness)
bForceColor = 0
; Change the position XY (Absolute screen values when no anchor is used. Relative position change if an screen anchor is used)
fPositionX = 0
fPositionY = 0
; Rescale (resize) the element
fScale = 100
; Rotate the element
fRotation = 0
; Change the opacity (in percent)
fOpacity = 100
; Move the element to a screen edge.
sScreenAnchor = TopLeft
; Override the screen padding
fScreenPadding = 0

[ActionCard]
; Contains more options, like when you open the special options on buildings to build a cable
bEnabled = 1
sColor = 
bForceColor = 0
; Vanilla: 215, 130
fPositionX = 0
fPositionY = 330
fScale = 100
fRotation = 0
fOpacity = 100
sScreenAnchor = 50% 50%
fScreenPadding = default

